    <rect x="5.25" y="14" width="1.5" height="3" rx="0.2" fill="#0a7c4a" stroke="none"/>
    <rect x="8.75" y="12.5" width="1.5" height="4.5" rx="0.2" fill="#0a7c4a" stroke="none"/>
    <rect x="12.25" y="11" width="1.5" height="6" rx="0.2" fill="#0a7c4a" stroke="none"/>
    <rect x="15.75" y="9.5" width="1.5" height="7.5" rx="0.2" fill="#0a7c4a" stroke="none"/>
  </g>
