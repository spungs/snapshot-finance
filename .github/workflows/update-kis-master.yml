name: Update KIS Stock Master

on:
  schedule:
    - cron: '0 1 * * 0'  # 매주 일요일 01:00 UTC (10:00 KST)
  workflow_dispatch:      # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    # job 전체에 env 주입 — npm ci 의 postinstall(prisma generate) 도 prisma.config.ts 의
    # env("DIRECT_URL") 을 읽으므로 ci 단계부터 필요.
    # DIRECT_URL secret 이 없으면 DATABASE_URL 로 fallback (둘 다 같은 DB 면 generate 만 통과시키면 충분).
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL || secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run seed:kis

      # KIS Master 동기화 실패는 침묵 실패가 가장 위험 — 매주 자동이라 누구도 보지 않으면 stale 데이터 누적.
      # DISCORD_WEBHOOK_URL secret 이 없으면 step skip.
      - name: Notify on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi
          curl -s -X POST -H 'Content-Type: application/json' \
            -d "{\"content\": \"🚨 KIS Master sync 실패\n run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$WEBHOOK"
