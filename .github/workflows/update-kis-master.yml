name: Update KIS Stock Master

on:
  schedule:
    - cron: '0 1 * * 0'  # 매주 일요일 01:00 UTC (10:00 KST)
  workflow_dispatch:      # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run seed:kis
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
